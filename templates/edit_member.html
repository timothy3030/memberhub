<!DOCTYPE html>
<html>

<head>

<title>Edit Member</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2>Edit Member</h2>

<form action="/update_member" method="POST">

<input type="hidden" name="id" value="{{member[0]}}">

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control" value="{{member[1]}}">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" value="{{member[2]}}">
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone" class="form-control" value="{{member[3]}}">
</div>

<div class="mb-3">
<label>Membership Type</label>
<input type="text" name="membership_type" class="form-control" value="{{member[4]}}">
</div>

<div class="mb-3">
<label>Join Date</label>
<input type="date" name="join_date" class="form-control" value="{{member[5]}}">
</div>

<div class="mb-3">
<label>Expiry Date</label>
<input type="date" name="expiry_date" class="form-control" value="{{member[6]}}">
</div>

<button type="submit" class="btn btn-success">
Update Member
</button>

<a href="/members" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</body>

</html>
